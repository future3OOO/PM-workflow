  - Playbooks:
    - Landlord & Property Onboarding: playbooks/landlord-property-onboarding.md
    - Leasing: playbooks/leasing.md
    - Tenancy Setup: playbooks/tenancy-setup.md
    - Compliance — Healthy Homes: playbooks/compliance-healthy-homes.md
    - Tenant Onboarding: playbooks/tenant-onboarding.md
    - Inspections: playbooks/inspections.md
    - Maintenance (Tapi): playbooks/maintenance-tapi.md
    - Renewals & Rent Reviews: playbooks/renewals-rent-reviews.md
    - End of Tenancy & Lease Break: playbooks/end-of-tenancy.md
    - Notices & Communications: playbooks/notices-comms.md
    - Email & Recordkeeping: playbooks/email-recordkeeping.md
  - SOPs:
    - Property Tree:
      - Create Owner & Property: sops/propertytree-create-owner-property.md
      - Create Tenancy & Dates: sops/propertytree-create-tenancy-dates.md
      - Inspection Scheduling: sops/propertytree-inspection-scheduling.md
      - Filing & Naming: sops/propertytree-filing-naming.md
    - TPS / Tenancy.co.nz:
      - Property Setup & Trade Me: sops/tps-property-setup.md
      - Viewings & BookMe: sops/tps-viewings-bookme.md
      - Application Processing: sops/tps-application-processing.md
      - Agreements & Signing: sops/tps-agreements-signing.md
